# Navigates every bottom tab and asserts a screen-unique element on each.
appId: com.swipeclean.free
name: Bottom-tab navigation
tags:
  - navigation
---
- launchApp
# Compress tab
- tapOn:
    text: "^Compress$"
- assertVisible: "Ready to Compress"
- assertVisible: "Filter"
# Stats tab — the "Largest Photos" preview section was removed 2026-06-15,
# so assert the always-rendered stat cards instead.
- tapOn:
    text: "^Stats$"
- assertVisible: "Storage Stats"
- assertVisible: "Total Used"
- assertVisible: "Space Cleared"
# Premium tab (Free user → upsell)
- tapOn:
    text: "^Premium$"
- assertVisible: "SwipeClean Pro"
# Back to Swipe
- tapOn:
    text: "^Swipe$"
- assertVisible: "All Media"
